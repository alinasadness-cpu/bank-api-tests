name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Start app in test mode
        run: |
          ls -la artifacts/
          java -jar artifacts/app-ibank.jar -P:profile=test &
          sleep 20
          curl -v http://localhost:9999/api/system/users || echo "Waiting for service..."

      - name: Run tests
        run: ./gradlew test
